<header class="header">
  <div class="top-desc">
    <p>Bienvenido a la mejor fuente de noticias de Anime y Manga a nivel mundial</p>
  </div>
  <div class="header-main">
    <div class="logo-container">
      <img src="assets/logo.png" alt="Anime News Logo" class="logo">
    </div>
    <div class="search-container">
      <input type="text" placeholder="Buscar noticias, animes o mangas..." class="search-bar" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
      <button class="search-btn" (click)="onSearch()">Buscar</button>
    </div>
  </div>
  <nav class="main-nav">
    <ul>
      <li><a routerLink="/" routerLinkActive="active">Inicio</a></li>
      <li><a routerLink="/noticias" routerLinkActive="active">Noticias</a></li>
      <li><a routerLink="/catalogo" routerLinkActive="active">Catálogo</a></li>
      <li><a routerLink="/mangas" routerLinkActive="active">Mangas</a></li>
      <li><a routerLink="/temporadas" routerLinkActive="active">Temporadas</a></li>
    </ul>
  </nav>
</header>
